<div>
    <mat-card class="card-notas">
      <mat-card-header class="card-header">
        <mat-card-title>Notas</mat-card-title>
        <mat-card-subtitle>registrar nota</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content class="card-content">
        <mat-form-field appearance="fill">
          <mat-label>Descrição</mat-label>
          <textarea matInput #description required> </textarea>
        </mat-form-field>
      </mat-card-content>
  
      <mat-card-actions class="card-actions">
        <button mat-raised-button class="card-button" color="primary" (click)="createNote(description.value)">Registrar</button>
      </mat-card-actions>
    </mat-card>
    
  </div>
