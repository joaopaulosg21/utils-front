<mat-list class="list">
    <div class="cards">
        <mat-card class="note-card" *ngFor="let note of notes">
            <mat-card-header>
                <mat-card-title>{{note.description}}</mat-card-title>
            </mat-card-header>
            <mat-card-content>
                Dia e horario : {{note.createdAt}}
            </mat-card-content>
            <mat-card-actions>
            </mat-card-actions>
        </mat-card>
    </div>
</mat-list>
