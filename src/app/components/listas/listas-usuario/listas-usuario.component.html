<mat-accordion *ngFor="let item of lists">
    <mat-expansion-panel hideToggle (click)="viewList(item.id)">
        <mat-expansion-panel-header>
            <mat-panel-title class="list-name">
                {{item.name}}
            </mat-panel-title>
            <mat-panel-description>
            </mat-panel-description>
        </mat-expansion-panel-header>
        <button mat-raised-button class="button" (click)="deleteTable(item.id)">
            Deletar tabela
        </button>
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 demo-table">

            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Name</th>
                <td mat-cell *matCellDef="let element" (click)="change(element.name)"
                    [ngClass]="element.status ? 'line':'' ">{{element.name}}</td>
            </ng-container>

            <ng-container matColumnDef="quantity">
                <th mat-header-cell *matHeaderCellDef>Quantity</th>
                <td mat-cell *matCellDef="let element" [ngClass]="element.status ? 'line':'' ">{{element.quantity}}</td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </mat-expansion-panel>
</mat-accordion>
