<p>
  <mat-toolbar color="primary">
    <span>App Utils</span>
    <div *ngIf="(token$ | async) as token;else semtoken" class="spacer">
      <div class="menu-items">
        <button mat-button [matMenuTriggerFor]="lista">Lista de compras</button>
        <mat-menu #lista="matMenu">
          <button mat-menu-item routerLink="/lista/registro"> Adicionar</button>
          <button mat-menu-item routerLink="/lista/todas"> Ver todas </button>
        </mat-menu>

        <button mat-button [matMenuTriggerFor]="tarefa">Tarefas diarias</button>
        <mat-menu #tarefa="matMenu">
          <button mat-menu-item routerLink="/tarefa/registro"> Adicionar</button>
          <button mat-menu-item routerLink="/tarefa/todas"> Ver todas </button>
          <button mat-menu-item routerLink="/tarefa/dia"> Tarefas do dia </button>
        </mat-menu>
      </div>
      <button mat-button (click)="logout()"> Logout </button>
    </div>
    <ng-template #semtoken>
      <button mat-button routerLink="/conta/registro"> Criar conta</button>
      <button mat-button routerLink="/conta/login"> Login</button>
    </ng-template>
  </mat-toolbar>
</p>
