<mat-list>
    <div class="menu-filters">
        <form class="search-form">
            <mat-form-field>
                <mat-label>Buscar</mat-label>
                <input matInput type="text" placeholder="descrição">
                <button mat-icon-button matSuffix class="form-icon">
                    <mat-icon>search</mat-icon>
                </button>
            </mat-form-field>
        </form>
        <mat-form-field>
            <mat-label>Escolha uma data</mat-label>
            <input matInput [matDatepicker]="picker" disabled>
            <mat-hint>MM/DD/YYYY</mat-hint>
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker touchUi #picker disabled="false"></mat-datepicker>
          </mat-form-field>          
        <button mat-icon-button color="primary" (click)="findByDate(picker)">
            <mat-icon>search</mat-icon>
        </button>
    </div>
    <mat-divider></mat-divider>
    <div class="cards">
        <mat-card class="tarefa-card" *ngFor="let task of allTasks">
            <mat-card-header>
                <mat-card-title>{{task.description}}</mat-card-title>
                <mat-card-subtitle>Completa : {{task.completed ? "Sim" : "Não"}}</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                Dia e horario : {{task.time}}
            </mat-card-content>
            <mat-card-actions>
                <button mat-button (click)="complete(task.id)" [disabled]=task.completed>Completar</button>
            </mat-card-actions>
        </mat-card>
    </div>
</mat-list>
