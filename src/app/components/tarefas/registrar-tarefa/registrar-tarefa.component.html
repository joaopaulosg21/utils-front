<div>
    <mat-card class="card-registro">
        <mat-card-header class="card-header">
            <mat-card-title>Registrar tarefa</mat-card-title>
            <mat-card-subtitle>nova tarefa</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content class="card-content">

            <mat-form-field appearance="fill">
                <mat-label>Descrição</mat-label>
                <textarea matInput #description required> </textarea>
            </mat-form-field>

            <mat-form-field>
                <mat-label>Data de conclusão</mat-label>
                <mat-date-range-input [formGroup]="range" [rangePicker]="picker" disabled>
                    <input matStartDate formControlName="start" placeholder="Start date">
                    <input matEndDate formControlName="end" placeholder="End date">
                </mat-date-range-input>
                <mat-hint>DD/MM/YYYY – DD/MM/YYYY</mat-hint>
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-date-range-picker touchUi #picker disabled="false"></mat-date-range-picker>
            </mat-form-field>
            <mat-form-field>
                <mat-label>Horario de conclusão</mat-label>
                <input matInput type="time" placeholder="horario" #time>
            </mat-form-field>

        </mat-card-content>

        <mat-card-actions class="card-actions">
            <button mat-raised-button class="card-button" color="primary"
                (click)="createTask(description.value,range.value,time)">Registrar</button>
        </mat-card-actions>
    </mat-card>

</div>
