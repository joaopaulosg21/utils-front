<div>
    <mat-card class="card-registro">
        <mat-card-header class="card-header">
            <mat-card-title>Registrar tarefa</mat-card-title>
            <mat-card-subtitle>nova tarefa</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content class="card-content">

            <mat-form-field appearance="fill">
                <mat-label>Descrição</mat-label>
                <input matInput #description required>
            </mat-form-field>

            <mat-form-field appearance="fill">
                <mat-label>Data de conclusão</mat-label>
                <input matInput [matDatepicker]="picker">
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker touchUi #picker></mat-datepicker>
            </mat-form-field>

            <mat-form-field>
                <mat-label>Horario de conclusão</mat-label>
                <input matInput type="time" placeholder="start date" #time>
            </mat-form-field>

            <mat-form-field>
                <mat-label>Tarefa repete todo dia?</mat-label>
                <mat-select disableRipple #everyDay>
                    <mat-option value="true">Sim</mat-option>
                    <mat-option value="false">Não</mat-option>
                </mat-select>
            </mat-form-field>

        </mat-card-content>

        <mat-card-actions class="card-actions">
            <button mat-raised-button class="card-button" color="primary"
                (click)="createTask(description.value,picker,time.value,everyDay.value)">Registrar</button>
        </mat-card-actions>
    </mat-card>

</div>
